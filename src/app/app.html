<div class="min-h-screen bg-[var(--color-background)] px-4 py-8 md:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8 text-center">
      <h1 class="text-3xl md:text-5xl font-bold text-[var(--color-white)]">
        Controle de Presença
      </h1>
      <p class="mt-3 text-[var(--color-muted)]">
        Formulário e tabela com persistência local, loading simulado e exportação.
      </p>
    </div>

    <div class="flex justify-center mb-6">
  <img
    src="assets/logo_marko.jpg"
    alt="Logo"
    class="w-[50px] h-[50px] object-contain"
  />
</div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
      <app-presence-form />
      <app-presence-table />
    </div>
  </div>

  @if (presenceService.loading()) {
    <div class="fixed inset-0 z-40 bg-black/75 backdrop-blur-sm flex items-center justify-center">
      <div class="rounded-3xl bg-[var(--color-surface)] border border-[var(--color-border)] p-8 text-center shadow-2xl w-[90%] max-w-md">
        <div class="mx-auto mb-4 h-12 w-12 animate-spin rounded-full border-4 border-[var(--color-border)] border-t-[var(--color-primary)]"></div>
        <h3 class="text-xl font-semibold text-[var(--color-white)]">
          Carregando...
        </h3>
        <p class="mt-2 text-sm text-[var(--color-muted)]">
          Aguarde enquanto realizamos a chamada para API.
        </p>
      </div>
    </div>
  }

  @if (presenceService.modalOpen()) {
    <div class="fixed inset-0 z-50 bg-black/70 flex items-center justify-center px-4">
      <div class="w-full max-w-md rounded-3xl border border-[var(--color-border)] bg-[var(--color-surface)] p-6 shadow-2xl">
        <h3 class="text-xl font-semibold text-[var(--color-white)]">
          Sucesso
        </h3>

        <p class="mt-3 text-[var(--color-muted)]">
          {{ presenceService.modalMessage() }}
        </p>

        <button
          type="button"
          (click)="presenceService.closeModal()"
          class="mt-6 w-full rounded-2xl bg-[var(--color-primary)] px-4 py-3 font-semibold text-[var(--color-white)]"
        >
          Fechar
        </button>
      </div>
    </div>
  }
</div>
